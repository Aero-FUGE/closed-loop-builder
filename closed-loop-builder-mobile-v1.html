<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>闭环建造者</title>
<style>
  :root{
    --bg1:#f6f7fb;
    --bg2:#eef1f7;
    --panel:rgba(255,255,255,.72);
    --panel-strong:rgba(255,255,255,.84);
    --line:#d8dde8;
    --line-soft:#e8ecf3;
    --text:#17191f;
    --sub:#7a828f;
    --ring:#5b6cff;
    --shadow:0 18px 50px rgba(15,23,42,.10);
    --shadow-soft:0 8px 24px rgba(15,23,42,.06);
    --radius:26px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei UI","Helvetica Neue",Arial,sans-serif;color:var(--text);background:
    radial-gradient(circle at 0% 0%, rgba(99,102,241,.09), transparent 24%),
    radial-gradient(circle at 100% 100%, rgba(56,189,248,.08), transparent 24%),
    linear-gradient(180deg,var(--bg1),var(--bg2));letter-spacing:.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .app{position:relative;width:100%;height:100%}
  .topbar{position:absolute;left:24px;top:22px;display:flex;gap:12px;z-index:5}
  .btn{border:none;background:var(--panel-strong);backdrop-filter:blur(18px);padding:11px 16px;border-radius:999px;box-shadow:var(--shadow-soft), inset 0 0 0 1px rgba(255,255,255,.72);font-size:13px;font-weight:650;letter-spacing:.01em;color:var(--text);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease, background .18s ease}
  .btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(15,23,42,.10), inset 0 0 0 1px rgba(255,255,255,.78)}
  .panel-shell{position:absolute;left:calc(100vw - 514px);top:22px;width:490px;z-index:8;transition:transform .22s ease, opacity .22s ease}.panel-shell.collapsed .sidebar{display:none}.panel-shell.collapsed .panel-drag{display:none}.panel-pill{position:absolute;right:24px;top:22px;z-index:9;height:44px;padding:0 16px;border:none;border-radius:999px;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);box-shadow:var(--shadow-soft), inset 0 0 0 1px rgba(255,255,255,.72);font-size:13px;font-weight:700;cursor:pointer}.panel-pill.hidden{display:none}.panel-drag{height:40px;display:flex;align-items:center;gap:8px;padding:0 12px;background:rgba(255,255,255,.42);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.70);border-bottom:none;border-radius:22px 22px 0 0;cursor:grab;user-select:none;box-shadow:var(--shadow-soft)}.panel-drag:active{cursor:grabbing}.panel-dot{width:7px;height:7px;border-radius:50%;background:rgba(148,163,184,.52)}.panel-title-mini{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-left:4px}.panel-toggle{margin-left:auto;width:28px;height:28px;border:none;border-radius:999px;background:rgba(255,255,255,.76);box-shadow:inset 0 0 0 1px rgba(220,226,236,.9);cursor:pointer;font-size:14px;color:#667085}.sidebar{position:relative;width:490px;max-height:calc(100vh - 64px);padding:20px 20px 92px;background:var(--panel);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.78);border-radius:0 0 30px 30px;box-shadow:0 24px 80px rgba(15,23,42,.12), inset 0 1px 0 rgba(255,255,255,.68);overflow:auto;z-index:5}
  .title{font-size:11px;color:var(--sub);margin:2px 0 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .big{font-size:30px;font-weight:700;letter-spacing:-.05em;margin:0 0 10px}
  .hint{font-size:12px;color:var(--sub);line-height:1.65;margin-bottom:18px}
  .card{background:rgba(255,255,255,.52);border:1px solid rgba(255,255,255,.82);border-radius:22px;padding:15px 15px 13px;margin-bottom:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}
  .label{font-size:11px;color:var(--sub);margin-bottom:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  input[type="text"]{width:100%;border:none;outline:none;background:rgba(255,255,255,.95);border-radius:16px;padding:12px 14px;font-size:14px;color:var(--text);box-shadow:inset 0 0 0 1px rgba(216,221,232,.95);transition:box-shadow .18s ease, transform .18s ease} input[type="text"]:focus{box-shadow:inset 0 0 0 1px rgba(99,102,241,.36), 0 0 0 4px rgba(99,102,241,.06)}
  input[type="color"]{width:100%;height:44px;border:none;padding:0;background:transparent;border-radius:14px;overflow:hidden}
  .row{display:flex;gap:10px;align-items:center}
  .mini{font-size:12px;padding:8px 10px;border-radius:12px;border:none;background:rgba(255,255,255,.88);cursor:pointer;box-shadow:inset 0 0 0 1px rgba(220,226,236,.95);font-weight:650;letter-spacing:.01em;transition:transform .16s ease, box-shadow .16s ease;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;color:#465062}
  .mini:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,23,42,.06), inset 0 0 0 1px rgba(220,226,236,.96)}
  .mini.danger{color:#a44}
  .task-list{display:flex;flex-direction:column;gap:10px}
  .task-item{display:flex;gap:10px;align-items:flex-start;padding:14px;border-radius:18px;background:rgba(255,255,255,.60);transition:transform .16s ease, box-shadow .16s ease, background .16s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.48)}.task-item[draggable="true"]{cursor:grab}.task-item.dragging{opacity:.45;transform:scale(.985)}.task-item.drag-over{box-shadow:0 0 0 2px rgba(99,102,241,.14) inset;background:rgba(241,244,251,.92)}
  .task-item.done{opacity:.76}
  .task-head{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}.task-actions{display:flex;align-items:center;gap:8px;justify-content:flex-start;margin-top:10px;flex-wrap:wrap}
  .task-main{min-width:0}
  .task-name{font-size:15px;font-weight:650;line-height:1.42;white-space:normal;word-break:keep-all;overflow-wrap:anywhere;letter-spacing:-.01em}
  .task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .task-date-label{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.04em}
  .task-date{border:none;outline:none;background:rgba(255,255,255,.94);border-radius:12px;padding:8px 10px;font-size:12px;color:var(--text);box-shadow:inset 0 0 0 1px rgba(220,226,236,.95);min-width:94px}
  .task-note{margin-top:12px}
  .ghost{background:rgba(255,255,255,.55)}
  .mini.icon{width:32px;height:32px;padding:0;border-radius:11px;font-size:12px}
  
  .sidebar-footer{position:sticky;bottom:-20px;padding-top:16px;margin-top:16px;background:linear-gradient(180deg, rgba(246,247,251,0), rgba(246,247,251,.82) 22%, rgba(246,247,251,.96) 100%)}
  .add-task-sticky{width:100%;height:46px;border:none;border-radius:16px;background:rgba(255,255,255,.92);box-shadow:var(--shadow-soft), inset 0 0 0 1px rgba(220,226,236,.95);font-size:14px;font-weight:700;cursor:pointer}
  .toolbar-note{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .note-editor{min-height:110px;background:rgba(255,255,255,.95);border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text);box-shadow:inset 0 0 0 1px rgba(220,226,236,.95);outline:none}
  .note-editor:focus{box-shadow:inset 0 0 0 1px rgba(99,102,241,.36), 0 0 0 4px rgba(99,102,241,.06)}
  .apple-divider{height:1px;background:linear-gradient(90deg, rgba(220,226,236,0), rgba(220,226,236,.9), rgba(220,226,236,0));margin:8px 0 4px}

@media (max-width: 960px){.panel-shell{left:auto;right:12px;width:360px}.sidebar{width:360px}.big{font-size:24px}.task-date{min-width:120px}}
  .empty{font-size:13px;color:var(--sub);padding:12px 4px}
  #canvas{position:absolute;inset:0;width:100%;height:100%}
  .edit-input{position:absolute;z-index:20;border:none;outline:none;background:rgba(255,255,255,.98);padding:10px 12px;border-radius:14px;box-shadow:0 10px 30px rgba(15,23,42,.18), inset 0 0 0 1px rgba(203,213,225,.85);font-size:14px;min-width:120px;font-weight:600;letter-spacing:.01em}
  @media (max-width: 960px){.sidebar{width:280px}.big{font-size:24px}}

  @media (max-width: 820px){
    .topbar{
      left:12px; right:12px; top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .btn{
      width:100%;
      min-height:42px;
      font-size:13px;
      padding:10px 12px;
    }
    .panel-shell{
      left:10px !important;
      right:10px;
      top:auto !important;
      bottom:10px;
      width:auto !important;
      max-width:none;
    }
    .panel-drag{
      height:34px;
      border-radius:18px 18px 0 0;
      justify-content:center;
      position:relative;
    }
    .panel-title-mini{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      margin-left:0;
    }
    .panel-toggle{
      position:absolute;
      right:10px;
      top:3px;
    }
    .sidebar{
      width:100% !important;
      max-height:52vh;
      border-radius:0 0 24px 24px;
      padding:16px 16px 82px;
    }
    .panel-pill{
      right:12px;
      top:auto;
      bottom:12px;
      height:42px;
      font-size:13px;
    }
    .big{
      font-size:24px;
      margin-bottom:8px;
    }
    .hint{
      font-size:11px;
      line-height:1.55;
      margin-bottom:14px;
    }
    .card{
      border-radius:18px;
      padding:12px 12px 11px;
      margin-bottom:10px;
    }
    .task-item{
      padding:12px;
      border-radius:16px;
    }
    .task-name{
      font-size:14px;
      line-height:1.45;
    }
    .task-actions{
      gap:6px;
    }
    .task-date{
      min-width:72px !important;
      padding:8px 8px;
      font-size:12px;
    }
    .mini.icon{
      width:30px;
      height:30px;
      font-size:12px;
    }
    .add-task-sticky{
      height:42px;
      font-size:13px;
      border-radius:14px;
    }
    input[type="text"]{
      font-size:16px;
    }
    .note-editor{
      min-height:90px;
      font-size:13px;
    }
  }

</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="btn" id="addRingBtn">新建圆环</button>
    <button class="btn" id="resetBtn">视图归位</button>
  </div>
  <svg id="canvas"></svg><div style="position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center, black 40%, transparent 100%);opacity:.16"></div>
  <div class="panel-shell" id="panelShell"><div class="panel-drag" id="panelDrag"><span class="panel-dot"></span><span class="panel-dot"></span><span class="panel-dot"></span><div class="panel-title-mini">闭环建造者</div><button class="panel-toggle" id="panelToggle" title="收起/展开">—</button></div><aside class="sidebar" id="sidebar"></aside></div><button class="panel-pill hidden" id="panelPill">闭环建造者</button>
</div>
<script>
(() => {
  const svg = document.getElementById('canvas');
  const sidebar = document.getElementById('sidebar');
  const addRingBtn = document.getElementById('addRingBtn');
  const resetBtn = document.getElementById('resetBtn');
  const NS = 'http://www.w3.org/2000/svg';
  const STORE = 'closed-loop-builder-v1-fixed';
  const BASE_R = 78;
  const SEG_GAP = 0.08;
  const SNAP = 20;
  const LABEL_RADIUS = 30;
  let view = { x: -window.innerWidth*0.6, y: -window.innerHeight*0.6, w: window.innerWidth*2.4, h: window.innerHeight*2.4 };
  let state = load() || { rings: [makeRing(window.innerWidth * 0.42, window.innerHeight * 0.52, 1, '闭环一')] };
  let selectedId = state.rings[0]?.id || null;
  let drag = null;
  let hoverRingId = null;
  let editInput = null;
  const shell = document.getElementById('panelShell');
  const panelDrag = document.getElementById('panelDrag');
  const panelToggle = document.getElementById('panelToggle');
  const panelPill = document.getElementById('panelPill');
  const UISTORE = 'closed-loop-builder-ui-v10';
  let ui = (()=>{ try{return JSON.parse(localStorage.getItem(UISTORE)) || {}; }catch{return {}; } })();

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function makeRing(x,y,scale=1,name='新的圆环'){
    return {
      id: uid(), x, y, scale, name,
      color: '#5b6cff',
      tasks: [makeTask('任务一'), makeTask('任务二'), makeTask('任务三')],
      parentId: null
    };
  }
  function makeTask(name='新任务'){ return { id: uid(), name, done:false, estHours:1, actualHours:'', completedAt:'', note:'', noteOpen:false }; }
  function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }
  function load(){
    try{
      const data = JSON.parse(localStorage.getItem(STORE));
      if(!data || !Array.isArray(data.rings)) return null;
      data.rings.forEach(r=>{
        if(!Array.isArray(r.tasks)) r.tasks = [];
        r.tasks.forEach(t=>{
          if(typeof t.estHours !== 'number' || Number.isNaN(t.estHours) || t.estHours <= 0) t.estHours = 1;
          if(typeof t.actualHours !== 'string' && typeof t.actualHours !== 'number') t.actualHours = '';
          t.actualHours = t.actualHours === '' ? '' : Number(t.actualHours);
          if(typeof t.completedAt !== 'string') t.completedAt = '';
          if(typeof t.note !== 'string') t.note = '';
          if(typeof t.noteOpen !== 'boolean') t.noteOpen = false;
          if(typeof t.done !== 'boolean') t.done = false;
        });
      });
      return data;
    }catch{return null;}
  }
  function saveUI(){ localStorage.setItem(UISTORE, JSON.stringify(ui)); }
  function applyPanelUI(){
    const mobile = window.innerWidth <= 820;
    if(mobile){
      shell.style.left = '10px';
      shell.style.right = '10px';
      shell.style.top = 'auto';
      shell.style.bottom = '10px';
    }else{
      const x = typeof ui.x === 'number' ? ui.x : Math.max(12, window.innerWidth - 514);
      const y = typeof ui.y === 'number' ? ui.y : 22;
      shell.style.left = x + 'px';
      shell.style.right = 'auto';
      shell.style.top = y + 'px';
      shell.style.bottom = 'auto';
    }
    if(ui.collapsed){
      shell.classList.add('collapsed');
      panelPill.classList.remove('hidden');
    }else{
      shell.classList.remove('collapsed');
      panelPill.classList.add('hidden');
    }
  }

  function clientToSvg(clientX, clientY){
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const out = pt.matrixTransform(svg.getScreenCTM().inverse());
    return { x: out.x, y: out.y };
  }
  function totalEst(r){ return r.tasks.reduce((s,t)=>s + (Number(t.estHours)||0), 0); }
  function totalActual(r){ return r.tasks.reduce((s,t)=>s + (t.done ? (Number(t.actualHours)||0) : 0), 0); }
  function remainingHours(r){ return r.tasks.reduce((s,t)=>s + (t.done ? 0 : (Number(t.estHours)||0)), 0); }
  function fmtHours(n){
    const v = Number(n)||0;
    if(v === 0) return '0h';
    if(v % 1 === 0) return `${v}h`;
    return `${v.toFixed(1)}h`;
  }
  function ringById(id){ return state.rings.find(r => r.id === id); }
  function childrenOf(id){ return state.rings.filter(r => r.parentId === id); }
  function ownComplete(r){ return r.tasks.length ? r.tasks.every(t=>t.done) : true; }
  function fullyComplete(r){ return ownComplete(r) && childrenOf(r.id).every(fullyComplete); }
  function rRadius(r){ return BASE_R * r.scale; }
  function strokeW(r){ return Math.max(9, 12 * r.scale); }
  function polar(cx,cy,r,ang){ return { x: cx + r * Math.cos(ang), y: cy + r * Math.sin(ang)}; }
  function arcPath(cx,cy,r,start,end){
    const s = polar(cx,cy,r,start), e = polar(cx,cy,r,end);
    const large = end - start > Math.PI ? 1 : 0;
    return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
  }
  function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}
  function clearEdit(commit=true){
    if(!editInput) return;
    const { onCommit } = editInput._meta || {};
    if(commit && onCommit) onCommit(editInput.value.trim());
    editInput.remove();
    editInput = null;
  }
  function showEditor(x,y,value,onCommit,width=140){
    clearEdit(false);
    const input = document.createElement('input');
    input.className = 'edit-input';
    input.type = 'text';
    input.value = value;
    input.style.left = x + 'px';
    input.style.top = y + 'px';
    input.style.width = width + 'px';
    input._meta = { onCommit, composing:false };
    document.body.appendChild(input);
    input.focus();
    input.select();
    input.addEventListener('pointerdown', (e)=>e.stopPropagation());
    input.addEventListener('mousedown', (e)=>e.stopPropagation());
    input.addEventListener('compositionstart', ()=>{ input._meta.composing = true; });
    input.addEventListener('compositionend', ()=>{ input._meta.composing = false; });
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && !input._meta.composing){ e.preventDefault(); clearEdit(true); }
      if(e.key === 'Escape'){ e.preventDefault(); clearEdit(false); }
    });
    // 不用 blur 自动提交，避免中文输入法和画布事件把焦点打断
    editInput = input;
  }

  function renderSidebar(){
    const r = ringById(selectedId);
    if(!r){
      sidebar.innerHTML = `<div class="big">闭环建造者</div><div class="hint">点左上角新建圆环，开始构建你的闭环。</div>`;
      return;
    }
    sidebar.innerHTML = `
      <div class="title">闭环建造者</div>
      <div class="big">${escapeHtml(r.name)}</div>
      <div class="hint">拖动圆环改位置，滚轮缩放。双击圆心名和任务名可直接改字。把小圆拖到大圆中心附近，会自动吸附成父子关系。顶部面板可拖动、可收起。备注支持基础格式。任务线段长度会按预计时间自动分配。</div>
      <div class="card">
        <div class="label">圆环名称</div>
        <input type="text" id="ringNameInput" value="${escapeHtml(r.name)}" />
      </div>
      <div class="card">
        <div class="label">环颜色</div>
        <input type="color" id="ringColorInput" value="${r.color}" />
      </div>
      <div class="card">
        <div class="row" style="justify-content:space-between;margin-bottom:10px">
          <div class="label" style="margin:0">任务</div>
          <button class="mini" id="addTaskBtn2">＋ 添加任务</button>
        </div>
        <div class="task-list">
          ${r.tasks.length ? r.tasks.map((t,i)=>`
            <div class="task-item ${t.done?'done':''}" data-task-item="${t.id}" draggable="true" style="flex-direction:column;align-items:stretch">
              <div class="task-head">
                <input type="checkbox" data-task-toggle="${t.id}" ${t.done?'checked':''} style="margin-top:3px" />
                <div class="task-name" title="${escapeHtml(t.name)}">${escapeHtml(t.name)}</div>
              </div>
              <div class="task-actions" style="row-gap:10px">
                <span class="task-date-label">预计</span>
                <input class="task-date" type="number" min="0.5" step="0.5" data-task-est="${t.id}" value="${Number(t.estHours)||1}" style="min-width:82px" />
                <span class="task-date-label">h</span>
                <span class="task-date-label">实际</span>
                <input class="task-date" type="number" min="0" step="0.5" data-task-actual="${t.id}" value="${t.actualHours === '' ? '' : Number(t.actualHours)}" style="min-width:82px" ${t.done ? '' : 'disabled'} />
                <span class="task-date-label">h</span>
                <span class="task-date-label">完成日</span>
                <input class="task-date" type="date" data-task-date="${t.id}" value="${t.completedAt || ''}" />
                <button class="mini ghost icon" data-task-note-toggle="${t.id}" title="${t.noteOpen ? '收起备注' : '备注'}">📝</button>
                <button class="mini icon" data-task-edit="${t.id}" title="改名">✎</button>
                <button class="mini danger icon" data-task-remove="${t.id}" title="删除">✕</button>
              </div>
              ${t.noteOpen ? `<div class="task-note"><div class="apple-divider"></div><div class="toolbar-note"><button class="mini icon" data-note-cmd="bold" data-note-id="${t.id}" title="加粗">B</button><button class="mini icon" data-note-cmd="italic" data-note-id="${t.id}" title="斜体"><i>I</i></button><button class="mini icon" data-note-cmd="insertUnorderedList" data-note-id="${t.id}" title="列表">•</button><input type="color" data-note-color="${t.id}" value="#111827" style="width:32px;height:32px;border:none;background:transparent;padding:0;border-radius:10px;overflow:hidden" /></div><div class="note-editor" data-task-note="${t.id}" contenteditable="true">${t.note || ''}</div></div>` : ``}
            </div>`).join('') : `<div class="empty">还没有任务。</div>`}
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="add-task-sticky" id="addTaskSticky">＋ 新增任务</button>
      </div>
      <div class="card">
        <div class="label">状态</div>
        <div style="font-size:14px;line-height:1.9;color:#334155">
          自身任务：${ownComplete(r) ? '已完成' : '进行中'}<br />
          子环数量：${childrenOf(r.id).length}<br />
          预计总计：${fmtHours(totalEst(r))}<br />
          已投入：${fmtHours(totalActual(r))}<br />
          剩余时间：${fmtHours(remainingHours(r))}<br />
          总闭环：${fullyComplete(r) ? '已闭合' : '未闭合'}
        </div>
      </div>
      <div class="card">
        <button class="mini danger" id="deleteRingBtn">删除当前圆环</button>
      </div>
    `;
    {
      const ringNameInput = document.getElementById('ringNameInput');
      ringNameInput.addEventListener('input', e=>{ r.name = e.target.value || '未命名'; save(); });
      ringNameInput.addEventListener('keydown', e=>{ if(e.key === 'Enter'){ e.preventDefault(); render(); } });
      ringNameInput.addEventListener('blur', ()=>{ render(); });
    }
    {
      const ringColorInput = document.getElementById('ringColorInput');
      ringColorInput.addEventListener('input', e=>{ r.color = e.target.value; save(); });
      ringColorInput.addEventListener('change', ()=>{ render(); });
      ringColorInput.addEventListener('blur', ()=>{ render(); });
    }
    document.getElementById('addTaskBtn2').addEventListener('click', ()=>{ r.tasks.push(makeTask('新任务')); save(); render(); });
    document.getElementById('addTaskSticky')?.addEventListener('click', ()=>{ r.tasks.push(makeTask('新任务')); save(); render(); });
    document.getElementById('deleteRingBtn').addEventListener('click', ()=>{
      state.rings = state.rings.filter(x=>x.id !== r.id);
      state.rings.forEach(x=>{ if(x.parentId === r.id) x.parentId = null; });
      selectedId = state.rings[0]?.id || null;
      save(); render();
    });
    sidebar.querySelectorAll('[data-task-toggle]').forEach(el => el.addEventListener('change', e=>{
      const t = r.tasks.find(x=>x.id===e.target.dataset.taskToggle);
      if(t){
        t.done = e.target.checked;
        if(t.done && !t.completedAt){
          const d = new Date();
          t.completedAt = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        if(t.done && t.actualHours === '') t.actualHours = Number(t.estHours)||1;
        save(); render();
      }
    }));
    sidebar.querySelectorAll('[data-task-est]').forEach(el => {
      el.addEventListener('input', e=>{
        const t = r.tasks.find(x=>x.id===e.target.dataset.taskEst);
        const v = Number(e.target.value);
        if(t){ t.estHours = (!Number.isNaN(v) && v > 0) ? v : 1; save(); }
      });
      el.addEventListener('change', ()=>{ render(); });
    });
    sidebar.querySelectorAll('[data-task-actual]').forEach(el => {
      el.addEventListener('input', e=>{
        const t = r.tasks.find(x=>x.id===e.target.dataset.taskActual);
        const raw = e.target.value;
        if(t){ t.actualHours = raw === '' ? '' : Math.max(0, Number(raw)||0); save(); }
      });
      el.addEventListener('change', ()=>{ render(); });
    });
    sidebar.querySelectorAll('[data-task-date]').forEach(el => {
      el.addEventListener('input', e=>{
        const t = r.tasks.find(x=>x.id===e.target.dataset.taskDate);
        if(t){ t.completedAt = e.target.value; save(); }
      });
      el.addEventListener('change', ()=>{ render(); });
    });
    sidebar.querySelectorAll('[data-task-note-toggle]').forEach(el => el.addEventListener('click', e=>{
      const t = r.tasks.find(x=>x.id===e.target.dataset.taskNoteToggle);
      if(t){ t.noteOpen = !t.noteOpen; save(); render(); }
    }));
    sidebar.querySelectorAll('[data-task-note]').forEach(el => {
      el.addEventListener('input', e=>{
        const t = r.tasks.find(x=>x.id===e.target.dataset.taskNote);
        if(t){ t.note = e.target.innerHTML; save(); }
      });
    });
    sidebar.querySelectorAll('[data-note-cmd]').forEach(el => {
      el.addEventListener('click', e=>{
        const id = e.currentTarget.dataset.noteId;
        const editor = sidebar.querySelector(`[data-task-note="${id}"]`);
        if(!editor) return;
        editor.focus();
        document.execCommand(e.currentTarget.dataset.noteCmd, false, null);
        const t = r.tasks.find(x=>x.id===id);
        if(t){ t.note = editor.innerHTML; save(); }
      });
    });
    sidebar.querySelectorAll('[data-note-color]').forEach(el => {
      el.addEventListener('input', e=>{
        const id = e.currentTarget.dataset.noteColor;
        const editor = sidebar.querySelector(`[data-task-note="${id}"]`);
        if(!editor) return;
        editor.focus();
        document.execCommand('foreColor', false, e.currentTarget.value);
        const t = r.tasks.find(x=>x.id===id);
        if(t){ t.note = editor.innerHTML; save(); }
      });
    });

    let draggingTaskId = null;
    sidebar.querySelectorAll('[data-task-item]').forEach(el => {
      const id = el.dataset.taskItem;
      el.addEventListener('mousedown', e=>{ if(e.target.closest('[contenteditable],input,button')) return; e.stopPropagation(); });
      el.addEventListener('dragstart', e=>{
        draggingTaskId = id;
        el.classList.add('dragging');
        try{ e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); }catch{}
      });
      el.addEventListener('dragend', ()=>{
        draggingTaskId = null;
        sidebar.querySelectorAll('[data-task-item]').forEach(x=>x.classList.remove('dragging','drag-over'));
      });
      el.addEventListener('dragover', e=>{
        e.preventDefault();
        if(!draggingTaskId || draggingTaskId === id) return;
        el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', ()=> el.classList.remove('drag-over'));
      el.addEventListener('drop', e=>{
        e.preventDefault();
        el.classList.remove('drag-over');
        if(!draggingTaskId || draggingTaskId === id) return;
        const from = r.tasks.findIndex(x=>x.id===draggingTaskId);
        const to = r.tasks.findIndex(x=>x.id===id);
        if(from < 0 || to < 0) return;
        const [moved] = r.tasks.splice(from,1);
        r.tasks.splice(to,0,moved);
        save(); render();
      });
    });
    sidebar.querySelectorAll('[data-task-remove]').forEach(el => el.addEventListener('click', e=>{
      r.tasks = r.tasks.filter(x=>x.id !== e.target.dataset.taskRemove); save(); render();
    }));
    sidebar.querySelectorAll('[data-task-edit]').forEach(el => el.addEventListener('click', e=>{
      const t = r.tasks.find(x=>x.id===e.target.dataset.taskEdit); if(!t) return;
      const rect = e.target.getBoundingClientRect();
      showEditor(rect.left - 80, rect.top - 4, t.name, val => { if(val) t.name = val; save(); render(); }, 180);
    }));
  }


  function clientToSvg(clientX, clientY){
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const p = pt.matrixTransform(svg.getScreenCTM().inverse());
    return { x:p.x, y:p.y };
  }
  function render(){
    clearEdit(false);
    svg.innerHTML = '';
    svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);
    state.rings.forEach(r => {
      const g = document.createElementNS(NS,'g');
      g.dataset.ringId = r.id;
      svg.appendChild(g);
      const rad = rRadius(r);
      const sw = strokeW(r);
      const selected = r.id === selectedId;
      const tasks = r.tasks;
      // subtle ghost rail
      const base = document.createElementNS(NS,'circle');
      base.setAttribute('cx', r.x); base.setAttribute('cy', r.y); base.setAttribute('r', rad);
      base.setAttribute('fill', 'none');
      base.setAttribute('stroke', 'rgba(203,213,225,.8)');
      base.setAttribute('stroke-dasharray', `${Math.max(6, sw*0.55)} ${Math.max(10, sw*0.95)}`);
      base.setAttribute('stroke-width', sw * 0.34);
      g.appendChild(base);
      if(selected){
        const sel = document.createElementNS(NS,'circle');
        sel.setAttribute('cx', r.x); sel.setAttribute('cy', r.y); sel.setAttribute('r', rad + sw*0.8);
        sel.setAttribute('fill', 'none'); sel.setAttribute('stroke', 'rgba(91,108,255,.12)'); sel.setAttribute('stroke-width', sw * 0.85);
        g.appendChild(sel);
      }
      // task arcs
      if(tasks.length){
        const totalHours = Math.max(0.0001, tasks.reduce((s,t)=>s + Math.max(0.5, Number(t.estHours)||1), 0));
        let cursor = -Math.PI/2;
        tasks.forEach((t, i) => {
          const portion = (Math.max(0.5, Number(t.estHours)||1) / totalHours) * Math.PI * 2;
          const start = cursor + SEG_GAP/2;
          const end = cursor + portion - SEG_GAP/2;
          cursor += portion;
          // invisible hit area
          const hit = document.createElementNS(NS,'path');
          hit.setAttribute('d', arcPath(r.x,r.y,rad,start,end));
          hit.setAttribute('fill', 'none');
          hit.setAttribute('stroke', 'rgba(0,0,0,0.001)');
          hit.setAttribute('stroke-width', sw*2.2);
          hit.style.cursor = 'pointer';
          hit.addEventListener('click', ev => { ev.stopPropagation(); t.done = !t.done; selectedId = r.id; save(); render(); });
          hit.addEventListener('dblclick', ev => {
            ev.stopPropagation();
            const m = polar(r.x,r.y,rad + sw + LABEL_RADIUS*r.scale, (start+end)/2);
            showEditor(m.x, m.y, t.name, val=>{ if(val) t.name = val; save(); render(); }, 180);
          });
          g.appendChild(hit);
          if(t.done){
            const path = document.createElementNS(NS,'path');
            path.setAttribute('d', arcPath(r.x,r.y,rad,start,end));
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', r.color);
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-width', sw);
            g.appendChild(path);
          }
          if(!r.parentId || selected){
            const m = polar(r.x,r.y,rad + sw + LABEL_RADIUS*r.scale, (start+end)/2);
            const label = document.createElementNS(NS,'text');
            label.setAttribute('x', m.x); label.setAttribute('y', m.y);
            label.setAttribute('text-anchor', 'middle');
            label.setAttribute('dominant-baseline', 'middle');
            label.setAttribute('fill', '#6b7280');
            label.setAttribute('font-size', 12 * Math.max(.9, r.scale));
            label.style.pointerEvents = 'none';
            label.textContent = t.name.length > 6 && !selected ? t.name.slice(0,6) + '…' : t.name;
            g.appendChild(label);
          }
        });
      }
      // center capsule
      const pill = document.createElementNS(NS, 'rect');
      pill.setAttribute('x', r.x - rad*0.7); pill.setAttribute('y', r.y - 18*r.scale);
      pill.setAttribute('width', rad*1.4); pill.setAttribute('height', 36*r.scale);
      pill.setAttribute('rx', 18*r.scale); pill.setAttribute('fill', 'rgba(255,255,255,.92)');
      pill.setAttribute('stroke', selected ? 'rgba(91,108,255,.30)' : 'rgba(203,213,225,.9)');
      g.appendChild(pill);
      const name = document.createElementNS(NS,'text');
      name.setAttribute('x', r.x); name.setAttribute('y', r.y + 1);
      name.setAttribute('text-anchor', 'middle'); name.setAttribute('dominant-baseline', 'middle');
      name.setAttribute('font-size', 15 * Math.max(.9, r.scale)); name.setAttribute('fill', '#111827');
      name.setAttribute('font-weight', '600');
      name.textContent = r.name;
      name.style.cursor = 'text';
      name.addEventListener('dblclick', ev => { ev.stopPropagation(); showEditor(r.x - 80, r.y - 18, r.name, val=>{ if(val) r.name=val; save(); render(); }, 160); });
      g.appendChild(name);

      const sub = document.createElementNS(NS,'text');
      sub.setAttribute('x', r.x); sub.setAttribute('y', r.y + 18 * Math.max(.95, r.scale));
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('dominant-baseline', 'middle');
      sub.setAttribute('fill', '#7a828f');
      sub.setAttribute('font-size', 10.5 * Math.max(.92, r.scale));
      sub.setAttribute('font-weight', '600');
      sub.textContent = `总计 ${fmtHours(totalEst(r))} · 剩余 ${fmtHours(remainingHours(r))}`;
      g.appendChild(sub);

      if(fullyComplete(r)){
        const ringGlow = document.createElementNS(NS,'circle');
        ringGlow.setAttribute('cx', r.x); ringGlow.setAttribute('cy', r.y); ringGlow.setAttribute('r', rad + sw*0.25);
        ringGlow.setAttribute('fill','none'); ringGlow.setAttribute('stroke', r.color); ringGlow.setAttribute('stroke-opacity','.18'); ringGlow.setAttribute('stroke-width', sw*1.8);
        g.insertBefore(ringGlow, g.firstChild);
      }
      const dragCircle = document.createElementNS(NS,'circle');
      dragCircle.setAttribute('cx', r.x); dragCircle.setAttribute('cy', r.y); dragCircle.setAttribute('r', rad + sw*2.1);
      dragCircle.setAttribute('fill','rgba(0,0,0,0.001)');
      dragCircle.style.cursor = 'grab';
      dragCircle.addEventListener('pointerdown', e => {
        selectedId = r.id;
        const pt = clientToSvg(e.clientX, e.clientY);
        drag = { type:'ring', id:r.id, dx:pt.x-r.x, dy:pt.y-r.y };
        dragCircle.setPointerCapture(e.pointerId);
        render();
      });
      dragCircle.addEventListener('pointerenter', ()=>hoverRingId = r.id);
      dragCircle.addEventListener('pointerleave', ()=>hoverRingId = null);
      g.appendChild(dragCircle);
      // parent-child line
      if(r.parentId){
        const p = ringById(r.parentId);
        if(p){
          const line = document.createElementNS(NS,'line');
          line.setAttribute('x1', p.x); line.setAttribute('y1', p.y); line.setAttribute('x2', r.x); line.setAttribute('y2', r.y);
          line.setAttribute('stroke', 'rgba(148,163,184,.35)'); line.setAttribute('stroke-dasharray','4 8');
          svg.insertBefore(line, svg.firstChild);
        }
      }
    });
    renderSidebar();
  }

  function attachGlobal(){
    svg.addEventListener('click', (e)=>{
      if(e.target === svg){ render(); }
    });
    svg.addEventListener('pointerdown', (e)=>{
      if(e.target === svg){
        drag = { type:'pan', startClientX:e.clientX, startClientY:e.clientY, startX:view.x, startY:view.y };
      }
    });
    svg.addEventListener('pointermove', (e)=>{
      if(!drag) return;
      if(drag.type === 'pan'){
        const scaleX = view.w / svg.clientWidth;
        const scaleY = view.h / svg.clientHeight;
        view.x = drag.startX - (e.clientX - drag.startClientX) * scaleX;
        view.y = drag.startY - (e.clientY - drag.startClientY) * scaleY;
        render();
        return;
      }
      const r = ringById(drag.id);
      if(!r) return;
      const pt = clientToSvg(e.clientX, e.clientY);
      r.x = pt.x - drag.dx;
      r.y = pt.y - drag.dy;
      // snap into parent center if near and smaller
      r.parentId = null;
      for(const p of state.rings){
        if(p.id === r.id) continue;
        if(rRadius(r) >= rRadius(p)) continue;
        const d = Math.hypot(r.x - p.x, r.y - p.y);
        if(d <= SNAP){ r.x = p.x; r.y = p.y; r.parentId = p.id; break; }
      }
      save(); render();
    });
    svg.addEventListener('pointerup', ()=> drag = null);
    window.addEventListener('resize', ()=> render());
    window.addEventListener('wheel', (e)=>{
      if(e.target.closest && e.target.closest('.sidebar')) return;
      e.preventDefault();
      const id = hoverRingId || selectedId;
      const r = ringById(id);
      if(r && e.shiftKey){
        r.scale = Math.min(2.4, Math.max(0.42, r.scale + (e.deltaY < 0 ? 0.06 : -0.06)));
        save(); render();
      }else{
        const factor = e.deltaY < 0 ? 0.92 : 1.08;
        view.w = Math.max(window.innerWidth*0.8, Math.min(window.innerWidth*6, view.w * factor));
        view.h = Math.max(window.innerHeight*0.8, Math.min(window.innerHeight*6, view.h * factor));
        render();
      }
    }, { passive:false });
    document.addEventListener('pointerdown', (e)=>{ if(editInput && !editInput.contains(e.target)) clearEdit(true); });

    let panelMove = null;
    panelDrag.addEventListener('pointerdown', (e)=>{
      if(window.innerWidth <= 820) return;
      if(e.target.closest('button')) return;
      panelMove = { dx: e.clientX - shell.offsetLeft, dy: e.clientY - shell.offsetTop };
      panelDrag.setPointerCapture(e.pointerId);
    });
    panelDrag.addEventListener('pointermove', (e)=>{
      if(!panelMove) return;
      ui.x = Math.max(8, Math.min(window.innerWidth - 240, e.clientX - panelMove.dx));
      ui.y = Math.max(8, Math.min(window.innerHeight - 80, e.clientY - panelMove.dy));
      shell.style.left = ui.x + 'px';
      shell.style.top = ui.y + 'px';
    });
    panelDrag.addEventListener('pointerup', ()=>{ if(panelMove){ panelMove = null; saveUI(); } });
    panelToggle.addEventListener('click', ()=>{
      ui.collapsed = !ui.collapsed; saveUI(); applyPanelUI();
    });
    panelPill.addEventListener('click', ()=>{
      ui.collapsed = false; saveUI(); applyPanelUI();
    });

    addRingBtn.addEventListener('click', ()=>{
      const r = makeRing(window.innerWidth * (0.22 + Math.random()*0.35), window.innerHeight * (0.28 + Math.random()*0.36), .9 + Math.random()*.2, '新的圆环');
      state.rings.push(r); selectedId = r.id; save(); render();
    });
    resetBtn.addEventListener('click', ()=>{ view = { x: -window.innerWidth*0.6, y: -window.innerHeight*0.6, w: window.innerWidth*2.4, h: window.innerHeight*2.4 }; render(); });
    window.addEventListener('resize', ()=>{ applyPanelUI(); });
  }
  attachGlobal();
  applyPanelUI();
  render();
})();
</script>
</body>
</html>
